<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#0b0e11; --rail:#0e1117; --panel:#131722; --card:#161b26;
    --border:#1e222d; --border-soft:#171b24;
    --text:#d1d4dc; --muted:#787b86; --dim:#4a4f5a;
    --up:#26a69a; --down:#ef5350; --accent:#2b6cff; --amber:#e0a52b;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,monospace;
    --ui:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;color:inherit;cursor:pointer}

  .app{display:grid;grid-template-columns:270px 1fr 300px;height:100vh}
  @media(max-width:1100px){.app{grid-template-columns:230px 1fr}.info{display:none}}
  @media(max-width:760px){.app{grid-template-columns:1fr}.rail{display:none}}

  /* ---------- LEFT RAIL ---------- */
  .rail{background:var(--rail);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .rail-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
  .brand{font-weight:700;letter-spacing:.14em;font-size:12px;text-transform:uppercase;color:var(--text);display:flex;align-items:center;gap:8px}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up)}
  .search{margin-top:10px;position:relative}
  .search input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 30px;color:var(--text);font-size:12.5px;font-family:var(--mono);outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:9px;top:8px;width:14px;height:14px;stroke:var(--muted)}
  .list{flex:1;overflow-y:auto;padding:6px 0}
  .list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .group-h{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);padding:12px 16px 5px;font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;cursor:pointer;border-left:2px solid transparent}
  .row:hover{background:var(--panel)}
  .row.active{background:var(--panel);border-left-color:var(--accent)}
  .row .sym{font-family:var(--mono);font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:6px}
  .row .nm{font-size:10.5px;color:var(--muted);margin-top:1px}
  .row .rt{text-align:right}
  .row .px{font-family:var(--mono);font-size:12px}
  .row .ch{font-family:var(--mono);font-size:10.5px;margin-top:1px}
  .lev{font-size:8px;background:var(--amber);color:#1a1206;padding:1px 4px;border-radius:3px;font-weight:800;letter-spacing:.04em}
  .up{color:var(--up)} .down{color:var(--down)}

  /* ---------- CENTER ---------- */
  .center{display:flex;flex-direction:column;min-width:0;background:var(--panel)}
  .chart-head{display:flex;align-items:center;gap:18px;padding:12px 18px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .sym-title{display:flex;align-items:baseline;gap:10px}
  .sym-title .t{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:.02em}
  .sym-title .n{color:var(--muted);font-size:12px}
  .quote{display:flex;align-items:baseline;gap:10px}
  .quote .last{font-family:var(--mono);font-size:20px;font-weight:700}
  .quote .chg{font-family:var(--mono);font-size:13px;font-weight:600}
  .ohlc{display:flex;gap:14px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
  .ohlc b{color:var(--text);font-weight:600}
  .toolbar{display:flex;gap:6px;padding:8px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:11px;color:var(--muted);font-family:var(--mono);transition:.12s}
  .chip:hover{border-color:var(--dim);color:var(--text)}
  .chip.on{color:#fff;border-color:transparent}
  .chip.ema9.on{background:#e0a52b26;border-color:#e0a52b;color:#f0c869}
  .chip.ema20.on{background:#2b6cff26;border-color:#2b6cff;color:#7aa2ff}
  .chip.ema50.on{background:#26a69a26;border-color:#26a69a;color:#5fd6cb}
  .chip.ema200.on{background:#ef535026;border-color:#ef5350;color:#ff8a87}
  .chip.rsi.on{background:#9b6cff26;border-color:#9b6cff;color:#c0a2ff}
  .spacer{flex:1}
  .btn{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:5px 11px;font-size:11px;color:var(--text);font-family:var(--mono);display:flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--accent)}
  .charts{flex:1;position:relative;min-height:0}
  #main{position:absolute;inset:0;bottom:132px}
  #rsi{position:absolute;left:0;right:0;bottom:0;height:130px;border-top:1px solid var(--border)}
  #rsi.hidden{display:none}
  #main.full{bottom:0}
  .rsi-label{position:absolute;left:10px;top:6px;font-family:var(--mono);font-size:10px;color:var(--muted);z-index:3;pointer-events:none}

  /* ---------- RIGHT INFO ---------- */
  .info{background:var(--rail);border-left:1px solid var(--border);overflow-y:auto;padding:16px}
  .info::-webkit-scrollbar{width:8px}.info::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .info h3{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:20px 0 8px;font-weight:600}
  .info h3:first-child{margin-top:0}
  .stat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
  .stat .k{color:var(--muted)} .stat .v{font-family:var(--mono);font-weight:600}
  .warn{background:#e0a52b14;border:1px solid #e0a52b40;border-radius:7px;padding:10px 12px;font-size:11.5px;line-height:1.5;color:#e6c17a;margin-bottom:16px}
  .warn b{color:#f0c869}
  .div-row{display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0;font-family:var(--mono);color:var(--muted)}
  .div-row .a{color:var(--text)}
  .earn{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px 12px;display:flex;justify-content:space-between;align-items:center}
  .earn .d{font-family:var(--mono);font-weight:700;font-size:14px}
  .empty-note{color:var(--dim);font-size:11.5px;font-style:italic}

  .sample-banner{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#161b26;border:1px solid var(--amber);color:#e6c17a;font-size:11px;padding:6px 14px;border-radius:20px;z-index:50;font-family:var(--mono)}
  .hidden{display:none!important}

  /* news */
  .news-item{padding:9px 0;border-bottom:1px solid var(--border-soft)}
  .news-item a{color:var(--text);text-decoration:none;font-size:12px;line-height:1.4;display:block}
  .news-item a:hover{color:#7aa2ff}
  .news-meta{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px;display:flex;gap:8px}
  .news-src{color:var(--accent)}

  /* econ popup (styled after the TradingView event card) */
  .econ-pop{position:absolute;z-index:40;width:300px;background:#1c2129;border:1px solid #2a303c;border-left:3px solid var(--down);border-radius:8px;padding:16px 18px;box-shadow:0 12px 40px #000a}
  .econ-pop.med{border-left-color:var(--amber)}
  .econ-pop h4{font-size:16px;font-weight:700;margin-bottom:6px}
  .econ-pop .when{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:12px}
  .econ-pop .er{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
  .econ-pop .er .k{color:var(--muted)} .econ-pop .er .v{font-family:var(--mono);font-weight:600}
  .econ-pop .x{position:absolute;top:10px;right:12px;color:var(--muted);cursor:pointer;font-size:16px;line-height:1}

  /* overlay panels (calendar, portfolio) */
  .overlay{position:absolute;inset:0;background:var(--panel);z-index:30;display:flex;flex-direction:column}
  .ov-head{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .ov-head h2{font-size:15px;font-weight:700;letter-spacing:.02em}
  .ov-head .x{margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:12px;color:var(--muted)}
  .ov-body{flex:1;overflow-y:auto;padding:16px 20px}
  .ov-body::-webkit-scrollbar{width:9px}.ov-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* calendar */
  .cal-sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:18px 0 8px;font-weight:600}
  .cal-sec:first-child{margin-top:0}
  .cal-row{display:grid;grid-template-columns:96px 1fr 76px 76px 76px;gap:10px;align-items:center;padding:9px 10px;border-radius:6px;font-size:12.5px}
  .cal-row:hover{background:var(--card)}
  .cal-row.head{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding-bottom:4px}
  .cal-row .date{font-family:var(--mono);color:var(--muted);font-size:11.5px}
  .cal-row .ev{display:flex;align-items:center;gap:8px}
  .cal-row .flag{font-size:14px}
  .cal-row .imp{width:6px;height:6px;border-radius:50%;flex:none}
  .imp-high{background:var(--down)} .imp-medium{background:var(--amber)} .imp-low{background:var(--dim)}
  .cal-row .num{font-family:var(--mono);text-align:right;font-weight:600}
  .cal-row .a-beat{color:var(--up)} .cal-row .a-miss{color:var(--down)}
  .cal-badge{display:inline-block;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;background:var(--card);color:var(--muted);margin-left:6px}

  /* portfolio */
  .pf-summary{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:18px;padding:16px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px}
  .pf-summary .b{display:flex;flex-direction:column;gap:3px}
  .pf-summary .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .pf-summary .val{font-family:var(--mono);font-size:20px;font-weight:700}
  .pf-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .pf-table th{text-align:right;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border)}
  .pf-table th:first-child,.pf-table td:first-child{text-align:left}
  .pf-table td{padding:9px 10px;border-bottom:1px solid var(--border-soft);font-family:var(--mono)}
  .pf-table tr:hover td{background:var(--card)}
  .pf-sym{font-weight:700;cursor:pointer}
  .pf-sym:hover{color:#7aa2ff}
  .pf-note{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.5}
  .pnl-chip{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;margin-left:6px}
  .pnl-chip.up{background:#26a69a1f;color:var(--up)} .pnl-chip.down{background:#ef53501f;color:var(--down)}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT -->
  <aside class="rail">
    <div class="rail-head">
      <div class="brand"><span class="dot"></span> Terminal</div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" placeholder="Search symbol…" autocomplete="off">
      </div>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <!-- CENTER -->
  <main class="center">
    <div class="chart-head">
      <div class="sym-title"><span class="t" id="hSym">—</span><span class="n" id="hName"></span></div>
      <div class="quote"><span class="last" id="hLast">—</span><span class="chg" id="hChg"></span></div>
      <div class="ohlc" id="hOhlc"></div>
    </div>
    <div class="toolbar">
      <span class="chip ema9"   data-ema="9">EMA 9</span>
      <span class="chip ema20"  data-ema="20">EMA 20</span>
      <span class="chip ema50"  data-ema="50">EMA 50</span>
      <span class="chip ema200" data-ema="200">EMA 200</span>
      <span class="chip rsi"    id="rsiToggle">RSI 14</span>
      <span class="chip" id="eventsToggle" style="margin-left:8px">◧ Events</span>
      <span class="spacer"></span>
      <button class="btn" id="calBtn">📅 Calendar</button>
      <button class="btn" id="pfBtn">◈ Portfolio</button>
      <button class="btn" id="refresh" title="Reload the latest committed data">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
        Refresh
      </button>
    </div>
    <div class="charts">
      <div id="main"></div>
      <div id="rsi"><span class="rsi-label" id="rsiLabel">RSI 14</span></div>
      <div class="econ-pop hidden" id="econPop"></div>

      <!-- Calendar overlay -->
      <div class="overlay hidden" id="calOverlay">
        <div class="ov-head"><h2>Economic Calendar</h2>
          <span style="font-size:11px;color:var(--muted)">Published numbers are archived here permanently</span>
          <button class="x" data-close="calOverlay">Close</button></div>
        <div class="ov-body" id="calBody"></div>
      </div>

      <!-- Portfolio overlay -->
      <div class="overlay hidden" id="pfOverlay">
        <div class="ov-head"><h2>Portfolio</h2>
          <span style="font-size:11px;color:var(--muted)">Values in EUR — USD positions converted at live EUR/USD</span>
          <button class="x" data-close="pfOverlay">Close</button></div>
        <div class="ov-body" id="pfBody"></div>
      </div>
    </div>
  </main>

  <!-- RIGHT -->
  <aside class="info" id="info"></aside>
</div>
<div class="sample-banner hidden" id="sampleBanner">SAMPLE DATA — run the pipeline to load live prices</div>

<script>
const UP="#26a69a", DOWN="#ef5350", MUTED="#787b86", GRID="#1a1e28", TEXT="#d1d4dc";
const EMA_COLORS={9:"#e0a52b",20:"#2b6cff",50:"#26a69a",200:"#ef5350"};
let META=null, CUR=null, ECON=null, PORT=null, activeEma={9:false,20:false,50:true,200:false}, rsiOn=true, eventsOn=true;
let mainChart, rsiChart, candle, volSeries, emaSeries={}, rsiSeries, rsiBand30, rsiBand70, rsiAnchor, costLine=null;
let syncing=false, markerMap={};

const $=s=>document.querySelector(s);
const fmt=(n,d)=>{ if(n==null||isNaN(n))return"—"; d=d??(Math.abs(n)>=1000?2:Math.abs(n)>=1?2:4); return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); };
const fmtBig=n=>{ if(n==null)return"—"; const a=Math.abs(n); if(a>=1e12)return(n/1e12).toFixed(2)+"T"; if(a>=1e9)return(n/1e9).toFixed(2)+"B"; if(a>=1e6)return(n/1e6).toFixed(2)+"M"; return fmt(n); };
const pct=n=>(n>=0?"+":"")+n.toFixed(2)+"%";
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(s){ const d=new Date(s+"T00:00:00"); return `${d.getDate()} ${MONTHS[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`; }
function relTime(iso){ const t=new Date(iso).getTime(); if(isNaN(t))return""; const m=Math.floor((Date.now()-t)/60000); if(m<60)return m+"m ago"; const h=Math.floor(m/60); if(h<24)return h+"h ago"; return Math.floor(h/24)+"d ago"; }
const todayStr=()=>new Date().toISOString().slice(0,10);

/* ---------- indicators ---------- */
function ema(bars,p){ const k=2/(p+1); let prev=null; const out=[]; bars.forEach((b,i)=>{ prev = prev==null ? b.c : b.c*k+prev*(1-k); if(i>=p-1) out.push({time:b.t,value:prev}); }); return out; }
function rsi(bars,p=14){ const out=[]; let g=0,l=0; for(let i=1;i<bars.length;i++){ const ch=bars[i].c-bars[i-1].c; const up=Math.max(ch,0),dn=Math.max(-ch,0); if(i<=p){ g+=up; l+=dn; if(i===p){ g/=p; l/=p; out.push({time:bars[i].t,value:l===0?100:100-100/(1+g/l)}); } } else { g=(g*(p-1)+up)/p; l=(l*(p-1)+dn)/p; out.push({time:bars[i].t,value:l===0?100:100-100/(1+g/l)}); } } return out; }

/* ---------- charts ---------- */
function buildCharts(){
  const opts={
    autoSize:true,
    layout:{background:{color:"transparent"},textColor:MUTED,fontFamily:"ui-monospace,monospace",fontSize:11},
    grid:{vertLines:{color:GRID},horzLines:{color:GRID}},
    rightPriceScale:{borderColor:"#1e222d"},
    timeScale:{borderColor:"#1e222d",rightOffset:6},
    crosshair:{mode:0,vertLine:{color:"#3a3f4b",labelBackgroundColor:"#2b6cff"},horzLine:{color:"#3a3f4b",labelBackgroundColor:"#2b6cff"}},
  };
  mainChart=LightweightCharts.createChart($("#main"),opts);
  candle=mainChart.addCandlestickSeries({upColor:UP,downColor:DOWN,borderUpColor:UP,borderDownColor:DOWN,wickUpColor:UP,wickDownColor:DOWN});
  volSeries=mainChart.addHistogramSeries({priceScaleId:"vol",priceFormat:{type:"volume"}});
  mainChart.priceScale("vol").applyOptions({scaleMargins:{top:0.82,bottom:0}});

  rsiChart=LightweightCharts.createChart($("#rsi"),{...opts,timeScale:{...opts.timeScale,visible:false},rightPriceScale:{borderColor:"#1e222d"}});
  rsiSeries=rsiChart.addLineSeries({color:"#9b6cff",lineWidth:1.5,priceLineVisible:false});
  rsiBand70=rsiChart.addLineSeries({color:"#ef535055",lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
  rsiBand30=rsiChart.addLineSeries({color:"#26a69a55",lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
  rsiAnchor=rsiChart.addLineSeries({color:"rgba(0,0,0,0)",lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});

  // sync time scales both ways
  const sync=(src,dst)=>src.timeScale().subscribeVisibleLogicalRangeChange(r=>{ if(syncing||!r)return; syncing=true; dst.timeScale().setVisibleLogicalRange(r); syncing=false; });
  sync(mainChart,rsiChart); sync(rsiChart,mainChart);

  // OHLC legend on crosshair
  mainChart.subscribeCrosshairMove(param=>{
    if(!CUR)return;
    let bar;
    if(param.time){ const p=param.seriesData.get(candle); if(p) bar={o:p.open,h:p.high,l:p.low,c:p.close}; }
    if(!bar){ const b=CUR.bars[CUR.bars.length-1]; bar={o:b.o,h:b.h,l:b.l,c:b.c}; }
    renderOhlc(bar);
  });

  mainChart.subscribeClick(param=>{
    if(!param.time||!markerMap[param.time]){ closeEconPop(); return; }
    showEconPop(markerMap[param.time], param.point);
  });
}

function showEconPop(events, point){
  const pop=$("#econPop");
  const e=events[0];
  const dp=e.unit==="K"||e.unit==="M"?1:2;
  const val=v=>v==null?"—":(v.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:dp})+(e.unit&&e.unit!=="K"&&e.unit!=="M"?e.unit:""));
  let inner="";
  events.forEach((ev,i)=>{
    const beat=ev.actual!=null&&ev.forecast!=null?(ev.actual>=ev.forecast?"a-beat":"a-miss"):"";
    inner+=`${i>0?'<hr style="border:none;border-top:1px solid #2a303c;margin:12px 0">':''}
      <h4>${ev.flag} ${ev.name}</h4>
      <div class="when">${fmtDate(ev.date)} ${ev.time}</div>
      <div class="er"><span class="k">Actual</span><span class="v ${beat}">${ev.actual==null?"—":val(ev.actual)}</span></div>
      <div class="er"><span class="k">Forecast</span><span class="v">${ev.forecast==null?"—":val(ev.forecast)}</span></div>
      <div class="er"><span class="k">Previous</span><span class="v">${ev.previous==null?"—":val(ev.previous)}</span></div>`;
  });
  pop.innerHTML=`<span class="x" onclick="closeEconPop()">×</span>`+inner;
  pop.className="econ-pop"+(events.every(x=>x.importance!=="high")?" med":"");
  const box=$(".charts").getBoundingClientRect();
  let x=(point?point.x:box.width/2)+16, y=(point?point.y:40);
  if(x+310>box.width) x=Math.max(10,(point?point.x:0)-316);
  y=Math.max(8,Math.min(y,box.height-220));
  pop.style.left=x+"px"; pop.style.top=y+"px";
}
function closeEconPop(){ $("#econPop").classList.add("hidden"); }
window.closeEconPop=closeEconPop;

function loadSeries(){
  const b=CUR.bars;
  candle.setData(b.map(x=>({time:x.t,open:x.o,high:x.h,low:x.l,close:x.c})));
  const hasVol=b.some(x=>x.v>0);
  volSeries.setData(hasVol? b.map(x=>({time:x.t,value:x.v,color:(x.c>=x.o?"#26a69a44":"#ef535044")})):[]);
  // EMAs
  Object.keys(emaSeries).forEach(k=>{ mainChart.removeSeries(emaSeries[k]); delete emaSeries[k]; });
  [9,20,50,200].forEach(p=>{ if(activeEma[p]){ const s=mainChart.addLineSeries({color:EMA_COLORS[p],lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}); s.setData(ema(b,p)); emaSeries[p]=s; } });
  // RSI
  const r=rsi(b,14);
  rsiSeries.setData(r);
  if(r.length){
    // reference bands at 30/70 plus invisible anchors at 0/100 so the pane frames RSI properly
    rsiBand70.setData([{time:r[0].time,value:70},{time:r[r.length-1].time,value:70}]);
    rsiBand30.setData([{time:r[0].time,value:30},{time:r[r.length-1].time,value:30}]);
    rsiAnchor.setData([{time:r[0].time,value:0},{time:r[r.length-1].time,value:100}]);
  }
  applyEconMarkers();
  applyCostLine();
  mainChart.timeScale().fitContent();
}

function applyEconMarkers(){
  markerMap={};
  if(!ECON||!eventsOn){ candle.setMarkers([]); return; }
  const barDates=new Set(CUR.bars.map(b=>b.t));
  const lastBar=CUR.bars[CUR.bars.length-1].t;
  const byDate={};
  ECON.events.filter(e=>e.date<=lastBar).forEach(e=>{
    // snap to an existing bar (event date, else nearest earlier trading day)
    let t=e.date;
    if(!barDates.has(t)){ const earlier=CUR.bars.filter(b=>b.t<=e.date); if(!earlier.length)return; t=earlier[earlier.length-1].t; }
    (byDate[t]=byDate[t]||[]).push(e);
  });
  const markers=Object.keys(byDate).sort().map(t=>{
    const evs=byDate[t]; markerMap[t]=evs;
    const high=evs.some(e=>e.importance==="high");
    return {time:t,position:"belowBar",color:high?"#ef5350":"#e0a52b",shape:"circle",
            text:evs.map(e=>e.code).join("·")};
  });
  candle.setMarkers(markers);
}

function applyCostLine(){
  if(costLine){ try{candle.removePriceLine(costLine);}catch(e){} costLine=null; }
  const pos=(PORT&&PORT.positions||[]).find(p=>p.id===CUR.id);
  if(pos){ costLine=candle.createPriceLine({price:pos.avgCost,color:"#787b86",lineWidth:1,lineStyle:2,axisLabelVisible:true,title:"avg cost"}); }
}

/* ---------- render ---------- */
function renderOhlc(bar){
  const dp = (CUR.kind==="fx")?4:2;
  const col=bar.c>=bar.o?"up":"down";
  $("#hOhlc").innerHTML=`O <b>${fmt(bar.o,dp)}</b> H <b>${fmt(bar.h,dp)}</b> L <b>${fmt(bar.l,dp)}</b> C <b class="${col}">${fmt(bar.c,dp)}</b>`;
}
function renderHead(){
  const last=CUR.last, prev=CUR.prevClose, ch=last-prev, chp=prev?ch/prev*100:0;
  const cls=ch>=0?"up":"down", dp=(CUR.kind==="fx")?4:2;
  $("#hSym").textContent=CUR.id;
  $("#hName").textContent=CUR.name;
  $("#hLast").textContent=fmt(last,dp); $("#hLast").className="last "+cls;
  $("#hChg").innerHTML=`${ch>=0?"+":""}${fmt(ch,dp)}  (${pct(chp)})`; $("#hChg").className="chg "+cls;
  renderOhlc(CUR.bars[CUR.bars.length-1]);
}
function renderInfo(){
  const el=$("#info"); const dp=(CUR.kind==="fx")?4:2;
  const last=CUR.last, prev=CUR.prevClose, ch=last-prev, chp=prev?ch/prev*100:0;
  const b=CUR.bars, hi=Math.max(...b.slice(-252).map(x=>x.h)), lo=Math.min(...b.slice(-252).map(x=>x.l));
  let html="";
  if(CUR.leveraged) html+=`<div class="warn"><b>2× daily leveraged.</b> Value decays over multi-day holds versus the underlying index — read this chart as a short-term trading vehicle, not a hold.</div>`;
  html+=`<h3>Quote</h3>
    <div class="stat"><span class="k">Last</span><span class="v ${ch>=0?'up':'down'}">${fmt(last,dp)}</span></div>
    <div class="stat"><span class="k">Change</span><span class="v ${ch>=0?'up':'down'}">${pct(chp)}</span></div>
    <div class="stat"><span class="k">Prev close</span><span class="v">${fmt(prev,dp)}</span></div>
    <div class="stat"><span class="k">52w high</span><span class="v">${fmt(hi,dp)}</span></div>
    <div class="stat"><span class="k">52w low</span><span class="v">${fmt(lo,dp)}</span></div>`;
  const f=CUR.fundamentals;
  if(f&&f.stats){
    const s=f.stats;
    html+=`<h3>Fundamentals</h3>`;
    const rows=[["Market cap",s.marketCap!=null?fmtBig(s.marketCap):null],["P/E (TTM)",s.trailingPE!=null?fmt(s.trailingPE,1):null],["P/E (fwd)",s.forwardPE!=null?fmt(s.forwardPE,1):null],["Div yield",s.dividendYield!=null?(s.dividendYield*100).toFixed(2)+"%":null],["Beta",s.beta!=null?fmt(s.beta,2):null],["Sector",s.sector||null],["Currency",s.currency||null]];
    rows.forEach(([k,v])=>{ if(v!=null) html+=`<div class="stat"><span class="k">${k}</span><span class="v">${v}</span></div>`; });
    if(f.nextEarnings){ html+=`<h3>Next earnings</h3><div class="earn"><span class="k">Reporting</span><span class="d">${f.nextEarnings}</span></div>`; }
    if(f.dividends&&f.dividends.length){ html+=`<h3>Recent dividends</h3>`; f.dividends.slice().reverse().forEach(d=>html+=`<div class="div-row"><span>${d.date}</span><span class="a">${fmt(d.amount,2)}</span></div>`); }
  } else if(["index","fx","crypto","commodity"].includes(CUR.kind)){
    html+=`<h3>Fundamentals</h3><p class="empty-note">No company data for ${CUR.kind} instruments — price, indicators, and news only.</p>`;
  }
  if(CUR.kind==="equity"||CUR.kind==="etf") html+=`<h3>News</h3><div id="newsBox"><p class="empty-note">Loading…</p></div>`;
  el.innerHTML=html;
  el.scrollTop=0;
  if(CUR.kind==="equity"||CUR.kind==="etf") loadNews(CUR.id);
}

async function loadNews(id){
  const box=$("#newsBox"); if(!box)return;
  try{
    const r=await fetch(`data/news/${id}.json?_=${Date.now()}`);
    if(!r.ok)throw 0;
    const d=await r.json();
    if(!d.items||!d.items.length){ box.innerHTML=`<p class="empty-note">No recent headlines.</p>`; return; }
    box.innerHTML=d.items.slice(0,12).map(n=>`<div class="news-item">
        <a href="${n.url}" target="_blank" rel="noopener">${n.headline}</a>
        <div class="news-meta"><span class="news-src">${n.source||""}</span><span>${relTime(n.datetime)}</span></div>
      </div>`).join("");
  }catch(e){ box.innerHTML=`<p class="empty-note">No news file yet — run the pipeline.</p>`; }
}

/* ---------- data loading ---------- */
async function loadSymbol(id){
  const res=await fetch(`data/${id}.json?_=${Date.now()}`);
  CUR=await res.json();
  document.querySelectorAll(".row").forEach(r=>r.classList.toggle("active",r.dataset.id===id));
  renderHead(); renderInfo(); loadSeries();
  history.replaceState(null,"",`#${id}`);
}

function buildList(filter=""){
  const el=$("#list"); el.innerHTML="";
  const groups={};
  META.symbols.forEach(s=>{ (groups[s.group]=groups[s.group]||[]).push(s); });
  const order=["Indices","FX","Crypto","Commodities","Stocks","ETFs"];
  order.forEach(g=>{
    const items=(groups[g]||[]).filter(s=>!filter||s.id.toLowerCase().includes(filter)||s.name.toLowerCase().includes(filter));
    if(!items.length)return;
    const h=document.createElement("div"); h.className="group-h"; h.textContent=g; el.appendChild(h);
    items.forEach(s=>{
      const ch=s.prevClose?((s.last-s.prevClose)/s.prevClose*100):0;
      const dp=g==="FX"?4:2;
      const row=document.createElement("div"); row.className="row"; row.dataset.id=s.id;
      row.innerHTML=`<div><div class="sym">${s.id}${s.leveraged?'<span class="lev">2×</span>':''}</div><div class="nm">${s.name}</div></div>
        <div class="rt"><div class="px">${fmt(s.last,dp)}</div><div class="ch ${ch>=0?'up':'down'}">${pct(ch)}</div></div>`;
      row.onclick=()=>loadSymbol(s.id);
      el.appendChild(row);
    });
  });
}

/* ---------- calendar (persistent archive) ---------- */
function renderCalendar(){
  const body=$("#calBody"); if(!ECON){ body.innerHTML=`<p class="empty-note">No econ file yet — run the pipeline.</p>`; return; }
  const today=todayStr();
  const upcoming=ECON.events.filter(e=>e.date>=today).sort((a,b)=>a.date<b.date?-1:1);
  const past=ECON.events.filter(e=>e.date<today).sort((a,b)=>a.date>b.date?-1:1);
  const val=(e,v)=>v==null?"—":(v.toLocaleString("en-US",{maximumFractionDigits:2})+(["%"].includes(e.unit)?"%":e.unit?e.unit:""));
  const row=e=>{
    const beat=e.actual!=null&&e.forecast!=null?(e.actual>=e.forecast?"a-beat":"a-miss"):"";
    return `<div class="cal-row">
      <span class="date">${fmtDate(e.date)} ${e.time||""}</span>
      <span class="ev"><span class="imp imp-${e.importance}"></span><span class="flag">${e.flag}</span>${e.name}</span>
      <span class="num">${val(e,e.previous)}</span>
      <span class="num">${val(e,e.forecast)}</span>
      <span class="num ${beat}">${val(e,e.actual)}</span>
    </div>`;
  };
  const header=`<div class="cal-row head"><span></span><span>Event</span><span class="num">Prev</span><span class="num">Fcst</span><span class="num">Actual</span></div>`;
  body.innerHTML=
    `<div class="cal-sec">Upcoming</div>${header}${upcoming.map(row).join("")||'<p class="empty-note">Nothing scheduled.</p>'}`+
    `<div class="cal-sec">Published — archived</div>${header}${past.map(row).join("")}`;
}

/* ---------- portfolio (EUR base, USD converted at live rate) ---------- */
function eurusd(){ const e=META.symbols.find(s=>s.id==="EURUSD"); return e&&e.last?e.last:1.08; }
function renderPortfolio(){
  const body=$("#pfBody");
  const positions=(PORT&&PORT.positions)||[];
  if(!positions.length){ body.innerHTML=`<p class="empty-note">No positions. Add them in portfolio.json.</p>`; return; }
  const rate=eurusd(); const look=id=>META.symbols.find(s=>s.id===id);
  let tVal=0,tCost=0,tDay=0; const rows=[]; const missing=[];
  positions.forEach(p=>{
    const m=look(p.id); if(!m){ missing.push(p.id); return; }
    const cur=m.currency||"USD", fx=cur==="USD"?1/rate:1;
    const valN=p.shares*m.last, costN=p.shares*p.avgCost, dayN=(m.last-m.prevClose)*p.shares;
    const valE=valN*fx, costE=costN*fx, dayE=dayN*fx, pnlE=valE-costE, pnlPct=costN?(m.last/p.avgCost-1)*100:0;
    tVal+=valE; tCost+=costE; tDay+=dayE;
    rows.push({p,m,cur,valE,pnlE,pnlPct,dayE});
  });
  const tPnl=tVal-tCost, tPnlPct=tCost?tPnl/tCost*100:0;
  const eur=n=>"€"+n.toLocaleString("en-US",{maximumFractionDigits:0});
  const sPnl=n=>(n>=0?"+":"")+"€"+Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});
  let html=`<div class="pf-summary">
      <div class="b"><span class="lbl">Total value</span><span class="val">${eur(tVal)}</span></div>
      <div class="b"><span class="lbl">Unrealised P&L</span><span class="val ${tPnl>=0?'up':'down'}">${sPnl(tPnl)} <span style="font-size:13px">(${pct(tPnlPct)})</span></span></div>
      <div class="b"><span class="lbl">Today</span><span class="val ${tDay>=0?'up':'down'}">${sPnl(tDay)}</span></div>
      <div class="b"><span class="lbl">Cost basis</span><span class="val" style="font-weight:600">${eur(tCost)}</span></div>
    </div>
    <table class="pf-table"><thead><tr>
      <th>Symbol</th><th>Qty</th><th>Avg</th><th>Last</th><th>Value €</th><th>Day</th><th>P&L</th><th>Weight</th>
    </tr></thead><tbody>`;
  rows.sort((a,b)=>b.valE-a.valE).forEach(r=>{
    html+=`<tr>
      <td><span class="pf-sym" data-go="${r.p.id}">${r.p.id}</span> <span style="color:var(--dim)">${r.cur}</span></td>
      <td>${r.p.shares}</td><td>${fmt(r.p.avgCost,2)}</td><td>${fmt(r.m.last,2)}</td>
      <td>${eur(r.valE)}</td>
      <td class="${r.dayE>=0?'up':'down'}">${sPnl(r.dayE)}</td>
      <td class="${r.pnlE>=0?'up':'down'}">${sPnl(r.pnlE)} <span style="opacity:.7">(${pct(r.pnlPct)})</span></td>
      <td>${(r.valE/tVal*100).toFixed(1)}%</td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  if(missing.length) html+=`<p class="pf-note">Not in watchlist (skipped): ${missing.join(", ")}. Add them to symbols.json to track.</p>`;
  html+=`<p class="pf-note">USD positions converted to EUR at ${fmt(rate,4)} (live EUR/USD). Edit holdings in portfolio.json. Your avg cost also shows as a dashed line on each holding's chart.</p>`;
  body.innerHTML=html;
  body.querySelectorAll(".pf-sym").forEach(el=>el.onclick=()=>{ closeOverlays(); loadSymbol(el.dataset.go); });
}
function closeOverlays(){ $("#calOverlay").classList.add("hidden"); $("#pfOverlay").classList.add("hidden"); }
function wire(){
  document.querySelectorAll(".chip[data-ema]").forEach(c=>{
    const p=+c.dataset.ema; c.classList.toggle("on",activeEma[p]);
    c.onclick=()=>{ activeEma[p]=!activeEma[p]; c.classList.toggle("on",activeEma[p]); if(CUR)loadSeries(); };
  });
  const rt=$("#rsiToggle"); rt.classList.toggle("on",rsiOn);
  rt.onclick=()=>{ rsiOn=!rsiOn; rt.classList.toggle("on",rsiOn); $("#rsi").classList.toggle("hidden",!rsiOn); $("#main").classList.toggle("full",!rsiOn); mainChart.applyOptions({}); setTimeout(()=>{mainChart.timeScale().fitContent();},50); };
  $("#search").addEventListener("input",e=>buildList(e.target.value.toLowerCase().trim()));
  $("#search").addEventListener("keydown",e=>{ if(e.key==="Enter"){ const first=document.querySelector(".row"); if(first)first.click(); } });
  // keyboard up/down through visible rows
  document.addEventListener("keydown",e=>{
    if(["INPUT"].includes(document.activeElement.tagName)&&e.key!=="ArrowDown"&&e.key!=="ArrowUp")return;
    if(e.key!=="ArrowDown"&&e.key!=="ArrowUp")return;
    const rows=[...document.querySelectorAll(".row")]; if(!rows.length)return;
    let i=rows.findIndex(r=>r.classList.contains("active"));
    i = e.key==="ArrowDown" ? Math.min(rows.length-1,i+1) : Math.max(0,i-1);
    rows[i].click(); rows[i].scrollIntoView({block:"nearest"}); e.preventDefault();
  });
  $("#refresh").onclick=async()=>{ await init(true); if(CUR)await loadSymbol(CUR.id); };
  $("#eventsToggle").classList.toggle("on",eventsOn);
  $("#eventsToggle").onclick=()=>{ eventsOn=!eventsOn; $("#eventsToggle").classList.toggle("on",eventsOn); if(CUR)applyEconMarkers(); closeEconPop(); };
  $("#calBtn").onclick=()=>{ renderCalendar(); $("#calOverlay").classList.remove("hidden"); };
  $("#pfBtn").onclick=()=>{ renderPortfolio(); $("#pfOverlay").classList.remove("hidden"); };
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>$("#"+b.dataset.close).classList.add("hidden"));
  new ResizeObserver(()=>{ if(mainChart){mainChart.applyOptions({});rsiChart.applyOptions({});} }).observe($(".charts"));
}

/* ---------- init ---------- */
async function init(isRefresh){
  META=await(await fetch(`data/meta.json?_=${Date.now()}`)).json();
  try{ ECON=await(await fetch(`data/econ.json?_=${Date.now()}`)).json(); }catch(e){ ECON=null; }
  try{ PORT=await(await fetch(`portfolio.json?_=${Date.now()}`)).json(); }catch(e){ PORT=null; }
  $("#sampleBanner").classList.toggle("hidden",!META.sample);
  buildList($("#search").value.toLowerCase().trim());
  if(!isRefresh){
    const hash=location.hash.replace("#","");
    const start = META.symbols.find(s=>s.id===hash) ? hash : (META.symbols.find(s=>s.id==="LQQ")?"LQQ":META.symbols[0].id);
    await loadSymbol(start);
  }
}
buildCharts(); wire(); init();
</script>
